# @pairing — bearer loopback pairing.
#
# The TS harness starts `katacode serve` + `project add` and injects the printed
# host and one-time token as KC_HOST / KC_TOKEN (see src/flows/pairing.ts).
#
# clearState: false preserves the saved Metro server URL so the app loads past
# the Expo Dev Launcher. Navigation to the Add Environment form lives in the
# reusable shared/open-add-environment subflow. The ready-state assertion uses
# the `connection-status-ready` accessibility id on ConnectionStatusDot — a
# deliberate test contract (see apps/mobile/.../ConnectionStatusDot.tsx).
appId: com.katacode.dev
tags:
  - pairing
---
- launchApp:
    clearState: false
- runFlow: ../shared/open-add-environment.yaml
# Fill the Add Environment form. The fields are matched by their placeholder text
# (Host = "192.168.1.100:8080", Pairing code = "abc-123-xyz").
- tapOn:
    text: "192.168.1.100:8080"
- inputText: ${KC_HOST}
- tapOn:
    text: "abc-123-xyz"
- inputText: ${KC_TOKEN}
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 3000
# Submit button accessibility text is "add, ADD ENVIRONMENT".
- tapOn:
    text: "add, ADD ENVIRONMENT"
# The saved environment must reach "ready" — a green ConnectionStatusDot carrying
# the connection-status-ready accessibility id. This is the real pairing proof;
# it fails loudly if the loopback bearer handshake never settles.
- extendedWaitUntil:
    visible:
      id: "connection-status-ready"
    timeout: 30000
